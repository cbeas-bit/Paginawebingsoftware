<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — Mujer Cobra</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────────── -->
<nav class="nav scrolled" id="main-nav">
  <a href="index.html" class="nav-logo">MUJER COBRA</a>
  <ul class="nav-links">
    <li><a href="shop.html" data-i18n="nav_shop">Tienda</a></li>
    <li><a href="index.html#contacto" data-i18n="nav_contact">Contacto</a></li>
    <li>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </li>
    <li>
      <a href="cart.html" class="nav-cart active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-label" data-i18n="nav_cart">Carrito</span>
        <span class="cart-count" style="display:none">0</span>
      </a>
    </li>
  </ul>
  <button class="nav-hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ── PAGE HEADER ─────────────────────────────────────────── -->
<div class="page-header">
  <div class="kintsugi-bg"></div>
  <div class="page-header-content reveal">
    <h1><em data-i18n="nav_cart">Carrito</em></h1>
    <p>Tu selección de piezas / Your selection of pieces</p>
  </div>
</div>

<!-- ── CART LAYOUT ─────────────────────────────────────────── -->
<div class="cart-layout">
  <div id="cart-items-wrap">
    <!-- Rendered by cart.js -->
    <div style="padding:40px;color:rgba(245,237,224,0.4);text-align:center">Cargando carrito…</div>
  </div>
  <div id="cart-summary-wrap">
    <!-- Rendered by cart.js -->
  </div>
</div>

<!-- ── FOOTER ──────────────────────────────────────────────── -->
<footer>
  <div class="footer-bottom" style="padding:28px 60px">
    <span data-i18n="footer_copy">© 2026 Mujer Cobra</span>
    <em data-i18n="footer_tagline">El Arte de Creer y Crear</em>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
<script>
  // Re-render cart when language changes
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setTimeout(renderCart, 60));
  });
</script>
</body>
</html>
